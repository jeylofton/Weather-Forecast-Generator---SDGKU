<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Temperature Converter</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="assignment3.css">
        <link rel="icon" type="image/x-icon" href="image/weather-station.png">
    </head>
    <body>
    <h1>Weather Station Temperature Converter</h1>
    <div class="controls">
        <input type="number" class="temperature" placeholder="Enter temperature">
        <select class="scale">
            <option value="F">Fahrenheit °F</option>
            <option value="C">Celsius °C</option>
        </select>
        <button onclick="convertTemperature()">Convert</button>
    </div>
    <div class="weather-card">
        <div class="left-side">
            <div class="main-temp">--°</div>
            <div class="details">
                <span class="converted-temp">Converted: --</span>
                <span>|</span>
                <span class="weather-feel">Feels Like --°</span>
            </div>
            <div class="details">
                <span class="weather-level">Enter a temperature</span>
            </div>
        </div>
        <div class="right-side">
            <div class="weather-icon">☁️</div>
            <div class="weather-text">Waiting</div>
        </div>
    </div>

        <script src="scripts/assignment3.js"></script>
    </body>
</html>
